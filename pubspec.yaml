name: medication_system
description: "Medication adherence notification system with guardian alerts."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Local notifications & alarms
  flutter_local_notifications: ^18.0.0
  alarm: ^4.0.4
  timezone: ^0.9.4

  # Storage
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3

  # Firebase (FCM only — no Blaze plan needed)
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

  # Supabase (database + edge functions — free tier)
  supabase_flutter: ^2.9.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.1
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
